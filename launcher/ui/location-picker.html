<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Choose Your Location</title>
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; script-src 'self'">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      height: 100%;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
      background: #111111;
      color: #f4f5f7;
      -webkit-app-region: drag;
      overflow: hidden;
    }
    .container {
      display: flex;
      flex-direction: column;
      height: 100%;
      padding: 32px;
      -webkit-app-region: no-drag;
    }
    h1 {
      font-size: 22px;
      font-weight: 600;
      margin-bottom: 6px;
    }
    p.subtitle {
      font-size: 13px;
      color: rgba(255,255,255,0.6);
      margin-bottom: 24px;
    }
    .grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      flex: 1;
    }
    .loc-btn {
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.1);
      color: #f4f5f7;
      font-size: 16px;
      font-weight: 500;
      padding: 18px;
      border-radius: 10px;
      cursor: pointer;
      transition: all 0.15s;
      font-family: inherit;
    }
    .loc-btn:hover {
      background: rgba(229, 62, 62, 0.15);
      border-color: #e53e3e;
    }
    .loc-btn:focus { outline: 2px solid #e53e3e; outline-offset: 2px; }
    footer {
      padding-top: 24px;
      font-size: 11px;
      color: rgba(255,255,255,0.35);
      text-align: center;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Welcome to Portal</h1>
    <p class="subtitle">Pick your location to finish setup. You can change this later from the Portal tray menu.</p>
    <div class="grid" id="grid"></div>
    <footer>West Coast Strength · Portal launcher</footer>
  </div>
  <script src="location-picker.js"></script>
</body>
</html>
