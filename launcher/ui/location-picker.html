<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Portal Setup</title>
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; script-src 'self'">
  <style>
    :root {
      --bg: #f5f5f7;
      --card: #ffffff;
      --text: #1d1d1f;
      --muted: #6e6e73;
      --border: #d2d2d7;
      --hover: #f0f0f5;
      --accent: #007aff;
      --accent-hover: #0066cc;
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #1e1e1e;
        --card: #2c2c2e;
        --text: #f5f5f7;
        --muted: #98989d;
        --border: #3a3a3c;
        --hover: #3a3a3c;
        --accent: #0a84ff;
        --accent-hover: #409cff;
      }
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      height: 100%;
      font: 13px -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      -webkit-app-region: drag;
      overflow: hidden;
    }

    .wizard {
      display: flex;
      flex-direction: column;
      height: 100%;
      -webkit-app-region: no-drag;
    }

    .header {
      padding: 36px 32px 16px;
      text-align: center;
      -webkit-app-region: drag;
    }
    .header h1 {
      font-size: 18px;
      font-weight: 600;
      letter-spacing: -0.2px;
      margin-bottom: 6px;
    }
    .header p {
      font-size: 12px;
      color: var(--muted);
      line-height: 1.5;
    }

    .body {
      flex: 1;
      padding: 8px 24px 0;
      overflow-y: auto;
    }

    .location-list {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 8px;
      overflow: hidden;
    }
    .location-item {
      display: flex;
      align-items: center;
      padding: 10px 14px;
      cursor: pointer;
      border-bottom: 1px solid var(--border);
      transition: background 0.08s;
    }
    .location-item:last-child { border-bottom: none; }
    .location-item:hover { background: var(--hover); }
    .location-item input[type="radio"] {
      margin-right: 12px;
      accent-color: var(--accent);
      width: 14px;
      height: 14px;
    }
    .location-item span {
      font-size: 13px;
      color: var(--text);
    }

    .footer {
      padding: 16px 24px 20px;
      display: flex;
      justify-content: flex-end;
      gap: 8px;
      border-top: 1px solid var(--border);
      background: var(--bg);
    }

    .btn {
      font: inherit;
      padding: 5px 16px;
      border-radius: 6px;
      border: 1px solid transparent;
      cursor: pointer;
      transition: all 0.08s;
      min-width: 80px;
    }
    .btn-secondary {
      background: var(--card);
      color: var(--text);
      border-color: var(--border);
    }
    .btn-secondary:hover { background: var(--hover); }

    .btn-primary {
      background: var(--accent);
      color: white;
    }
    .btn-primary:hover:not(:disabled) { background: var(--accent-hover); }
    .btn-primary:disabled {
      opacity: 0.45;
      cursor: not-allowed;
    }
  </style>
</head>
<body>
  <div class="wizard">
    <div class="header">
      <h1>Portal Setup</h1>
      <p>Select the gym location for this device.<br>This can be changed later from Admin settings.</p>
    </div>
    <div class="body">
      <div class="location-list" id="list" role="radiogroup" aria-label="Location"></div>
    </div>
    <div class="footer">
      <button class="btn btn-secondary" id="cancel">Cancel</button>
      <button class="btn btn-primary" id="continue" disabled>Continue</button>
    </div>
  </div>
  <script src="location-picker.js"></script>
</body>
</html>
