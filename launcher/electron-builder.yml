appId: com.westcoaststrength.portal
productName: Portal
directories:
  output: dist

publish:
  provider: github
  owner: justinhuttinger
  repo: wcs-staff-portal

win:
  target: nsis
  icon: assets/icon.ico

nsis:
  oneClick: false
  perMachine: true
  allowToChangeInstallationDirectory: false
  createDesktopShortcut: always
  installerIcon: assets/icon.ico
  include: installer.nsh
